    será utilizada. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Captura a resolução da tela que está acessando a página. -->
    <title>Página Inicial</title> <!-- Define o título da página que será
    exibido na janela/aba do navegador. -->
</head> <!-- Encerra a sessão do cabeçalho da página. -->
<body> <!-- Inicia o corpo da página, aqui aparece
    o resultado da minha página. -->
</body> <!-- Encerra o corpo da página. -->
